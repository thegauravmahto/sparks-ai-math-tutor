<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sparks — Live K12 Math Tutor</title>
<link rel="stylesheet" href="/static/style.css" />
<!-- KaTeX for math rendering -->
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css" crossorigin="anonymous">
<script src="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.js" crossorigin="anonymous"></script>
<!-- function-plot (2D plots) — bundles d3 internally -->
<script src="https://cdn.jsdelivr.net/npm/function-plot@1.25.1/dist/function-plot.js"></script>
<!-- Rough.js for hand-drawn SVG -->
<script src="https://cdn.jsdelivr.net/npm/roughjs@4.6.6/bundled/rough.js"></script>
</head>
<body class="onboarding">

<!-- ═════════ WELCOME OVERLAY — avatar + name/class form, shown first ═════════ -->
<div id="welcome">
  <div id="welcome-card">
    <h1>Hi! I'm Sparks</h1>
    <p>Your voice math tutor. Tell me a little about yourself and let's get started.</p>
    <form id="welcome-form" autocomplete="off">
      <label for="student-name">Your name</label>
      <input id="student-name" type="text" placeholder="e.g. Priya" maxlength="40" required />
      <label for="student-class">Class</label>
      <select id="student-class">
        <option>Class 6</option>
        <option>Class 7</option>
        <option selected>Class 8</option>
        <option>Class 9</option>
        <option>Class 10</option>
      </select>
      <button type="submit">Start learning →</button>
    </form>
  </div>
</div>

<div id="app">

  <!-- ═════════ HEADER ═════════ -->
  <header id="topbar">
    <div id="topic-area">
      <div id="topic">Sparks</div>
      <div id="sub-topic"><span id="grade"></span><span id="step"></span></div>
    </div>
    <div id="status-area">
      <button id="langBtn" class="lang-btn" title="Toggle language">EN</button>
      <div id="status">disconnected</div>
    </div>
  </header>

  <!-- ═════════ LEFT PANEL: problem + transcript ═════════ -->
  <aside id="left-panel">
    <section id="problem-panel">
      <h3>Problem</h3>
      <div id="problem-empty">Ask Sparks a math question to begin.</div>
      <div id="problem-text" class="hidden"></div>
      <div id="problem-latex" class="hidden"></div>
    </section>

    <section id="transcript-panel">
      <h3>Conversation</h3>
      <div id="transcript" aria-live="polite"></div>
    </section>
  </aside>

  <!-- ═════════ RIGHT PANEL: working board ═════════ -->
  <main id="board" aria-label="Whiteboard"></main>

  <!-- ═════════ FOOTER: input controls ═════════ -->
  <footer id="hud">
    <form id="text-form" autocomplete="off">
      <input id="text-input" type="text"
             placeholder="Type a question, or hold SPACE to talk…"
             aria-label="Type a question" />
      <button id="photoBtn" type="button" title="Send a photo of a math problem"
              aria-label="Send a photo of a math problem">📷</button>
      <input id="photo-input" type="file" accept="image/*" capture="environment" hidden />
      <button id="sendBtn" type="submit">Send</button>
    </form>
    <div id="ptt-area">
      <span class="hint"><kbd>SPACE</kbd> hold to talk</span>
      <button id="pttBtn">🎙 Hold</button>
    </div>
  </footer>

  <!-- ═════════ AVATAR — friendly tutor owl ═════════ -->
  <div id="avatar-wrap">
    <svg id="avatar" viewBox="0 0 220 250" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <radialGradient id="owlBody" cx="0.5" cy="0.4" r="0.7">
          <stop offset="0%"   stop-color="#b88350"/>
          <stop offset="100%" stop-color="#5e3a1f"/>
        </radialGradient>
        <radialGradient id="owlBelly" cx="0.5" cy="0.5" r="0.6">
          <stop offset="0%"   stop-color="#fdf0d4"/>
          <stop offset="100%" stop-color="#f0d4a3"/>
        </radialGradient>
        <linearGradient id="beak" x1="0" x2="0" y1="0" y2="1">
          <stop offset="0%" stop-color="#ffc14e"/>
          <stop offset="100%" stop-color="#d77f1c"/>
        </linearGradient>
        <radialGradient id="mouthInterior" cx="0.5" cy="0.5" r="0.5">
          <stop offset="0%"   stop-color="#3c100c"/>
          <stop offset="60%"  stop-color="#6a2018"/>
          <stop offset="100%" stop-color="#9a3128"/>
        </radialGradient>
      </defs>

      <!-- Floor shadow -->
      <ellipse cx="110" cy="240" rx="65" ry="6" fill="#000" opacity="0.18"/>

      <!-- Feet -->
      <ellipse cx="92"  cy="234" rx="13" ry="6" fill="url(#beak)" stroke="#a4660d" stroke-width="1"/>
      <ellipse cx="128" cy="234" rx="13" ry="6" fill="url(#beak)" stroke="#a4660d" stroke-width="1"/>
      <line x1="86"  y1="234" x2="84"  y2="240" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="92"  y1="234" x2="92"  y2="241" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="98"  y1="234" x2="100" y2="240" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="122" y1="234" x2="120" y2="240" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="128" y1="234" x2="128" y2="241" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="134" y1="234" x2="136" y2="240" stroke="#a4660d" stroke-width="1.5" stroke-linecap="round"/>

      <!-- Body (round egg shape) -->
      <ellipse cx="110" cy="130" rx="78" ry="98" fill="url(#owlBody)"/>

      <!-- Wings (subtle on sides) -->
      <path class="wing wing-l" d="M 38 130 Q 30 178 48 220 Q 56 195 50 145 Z"
            fill="#5e3a1f" opacity="0.85"/>
      <path class="wing wing-r" d="M 182 130 Q 190 178 172 220 Q 164 195 170 145 Z"
            fill="#5e3a1f" opacity="0.85"/>

      <!-- Belly (lighter front oval) -->
      <ellipse cx="110" cy="155" rx="50" ry="65" fill="url(#owlBelly)"/>
      <!-- Belly feather hints -->
      <path d="M 90 145 Q 110 152 130 145" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M 86 175 Q 110 184 134 175" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>
      <path d="M 88 200 Q 110 208 132 200" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>

      <!-- Ear tufts (top of head) -->
      <path class="ear" d="M 70 56 Q 64 30 60 24 Q 78 28 82 50 Z" fill="url(#owlBody)"/>
      <path class="ear" d="M 150 56 Q 156 30 160 24 Q 142 28 138 50 Z" fill="url(#owlBody)"/>

      <!-- Glasses (big round, classic tutor) -->
      <circle cx="80"  cy="105" r="32" fill="#fcfaf5" stroke="#1a1a1a" stroke-width="3"/>
      <circle cx="140" cy="105" r="32" fill="#fcfaf5" stroke="#1a1a1a" stroke-width="3"/>
      <line x1="111" y1="105" x2="109" y2="105" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <line x1="109" y1="105" x2="111" y2="105" stroke="#1a1a1a" stroke-width="3" stroke-linecap="round"/>
      <path d="M 109 105 L 111 105"
            stroke="#1a1a1a" stroke-width="3.5" stroke-linecap="round"/>

      <!-- Eyes — bigger dark pupils inside the white glasses lenses -->
      <g id="eyes">
        <g class="eye">
          <ellipse class="eye-white" cx="80" cy="106" rx="15" ry="17" fill="#0d0a08"/>
          <circle class="pupil" cx="80" cy="106" r="0.1" fill="#0d0a08"/>
          <circle class="glint" cx="85" cy="99" r="4" fill="#ffffff"/>
          <circle cx="76" cy="113" r="1.8" fill="#ffffff" opacity="0.75"/>
        </g>
        <g class="eye">
          <ellipse class="eye-white" cx="140" cy="106" rx="15" ry="17" fill="#0d0a08"/>
          <circle class="pupil" cx="140" cy="106" r="0.1" fill="#0d0a08"/>
          <circle class="glint" cx="145" cy="99" r="4" fill="#ffffff"/>
          <circle cx="136" cy="113" r="1.8" fill="#ffffff" opacity="0.75"/>
        </g>
      </g>

      <!-- Beak (orange triangle below the glasses) -->
      <path d="M 110 138 L 100 152 Q 110 158 120 152 Z"
            fill="url(#beak)" stroke="#a4660d" stroke-width="1.2"/>

      <!-- Mouth: bigger, opens when talking (just below the beak) -->
      <g id="mouth-group" transform="translate(110 172)">
        <!-- Static smile (bolder) -->
        <path d="M -14 -2 Q 0 8 14 -2"
              stroke="#5e3a1f" stroke-width="2.2" fill="none" stroke-linecap="round" opacity="0.85"/>
        <!-- Animated dark mouth opening -->
        <ellipse id="mouth" cx="0" cy="2" rx="14" ry="0.8"
                 fill="url(#mouthInterior)" opacity="0"/>
        <!-- Tongue peek at high amplitude -->
        <path id="tongue" d="M-6 5 Q0 8 6 5 Q3 6 0 6.5 Q-3 6 -6 5 Z"
              fill="#e573a8" opacity="0"/>
      </g>

    </svg>
    <div id="avatar-label">Sparks</div>
  </div>

</div>

<script src="/static/avatar.js"></script>
<script src="/static/app.js"></script>
</body>
</html>
