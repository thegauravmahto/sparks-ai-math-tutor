<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 400" width="1600" height="400">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#fafafa"/>
      <stop offset="1" stop-color="#f4f4f5"/>
    </linearGradient>
    <linearGradient id="owlBody" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#c08b4d"/>
      <stop offset="1" stop-color="#8a5a26"/>
    </linearGradient>
    <linearGradient id="owlBelly" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f4e3c4"/>
      <stop offset="1" stop-color="#d9b67a"/>
    </linearGradient>
    <linearGradient id="beak" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#f6c054"/>
      <stop offset="1" stop-color="#c98a1c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0ea5e9"/>
      <stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="400" fill="url(#bgGrad)"/>
  <rect x="0" y="396" width="1600" height="4" fill="url(#accent)"/>

  <!-- Decorative math glyphs (faint) -->
  <g opacity="0.06" font-family="ui-serif, Georgia, serif" font-size="120" fill="#09090b">
    <text x="60"   y="120">&#x222B;</text>
    <text x="1380" y="380">&#x3C0;</text>
    <text x="200"  y="370">&#x221A;</text>
    <text x="1480" y="130">&#x2211;</text>
    <text x="900"  y="380">&#x394;</text>
    <text x="120"  y="280" font-size="80">x&#xB2;</text>
  </g>

  <!-- Title block (left) -->
  <g font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Inter, Roboto, sans-serif">
    <text x="80" y="150" font-size="84" font-weight="800" fill="#09090b" letter-spacing="-2">Sparks</text>
    <text x="80" y="200" font-size="28" font-weight="500" fill="#52525b">The live K-12 math tutor</text>
    <text x="80" y="252" font-size="22" font-weight="400" fill="#71717a">
      Realtime voice + hand-drawn whiteboard, powered by Gemini Live.
    </text>

    <!-- Tags -->
    <g transform="translate(80, 290)" font-size="16" font-weight="500">
      <rect x="0"   y="0" rx="14" ry="14" width="130" height="28" fill="#09090b"/>
      <text x="65"  y="19" fill="#fafafa" text-anchor="middle">Gemini Live API</text>
      <rect x="142" y="0" rx="14" ry="14" width="90"  height="28" fill="#e4e4e7"/>
      <text x="187" y="19" fill="#09090b" text-anchor="middle">NCERT</text>
      <rect x="244" y="0" rx="14" ry="14" width="110" height="28" fill="#e4e4e7"/>
      <text x="299" y="19" fill="#09090b" text-anchor="middle">EN / Hindi</text>
      <rect x="366" y="0" rx="14" ry="14" width="120" height="28" fill="#e4e4e7"/>
      <text x="426" y="19" fill="#09090b" text-anchor="middle">Push-to-talk</text>
    </g>
  </g>

  <!-- Owl avatar (right). Translated + scaled from the 220x250 source viewBox.
       Scale 1.4 -> 308x350; translate to roughly center vertically in 400 px.  -->
  <g transform="translate(1180, 25) scale(1.4)">
    <!-- shadow -->
    <ellipse cx="110" cy="240" rx="65" ry="6" fill="#000" opacity="0.18"/>

    <!-- feet -->
    <ellipse cx="92"  cy="234" rx="13" ry="6" fill="url(#beak)" stroke="#a4660d" stroke-width="1"/>
    <ellipse cx="128" cy="234" rx="13" ry="6" fill="url(#beak)" stroke="#a4660d" stroke-width="1"/>

    <!-- body -->
    <ellipse cx="110" cy="130" rx="78" ry="98" fill="url(#owlBody)"/>

    <!-- wings -->
    <path d="M 38 130 Q 30 178 48 220 Q 56 195 50 145 Z" fill="url(#owlBody)" stroke="#6b3f15" stroke-width="1" opacity="0.85"/>
    <path d="M 182 130 Q 190 178 172 220 Q 164 195 170 145 Z" fill="url(#owlBody)" stroke="#6b3f15" stroke-width="1" opacity="0.85"/>

    <!-- belly -->
    <ellipse cx="110" cy="155" rx="50" ry="65" fill="url(#owlBelly)"/>
    <path d="M 90 145 Q 110 152 130 145" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 86 175 Q 110 184 134 175" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>
    <path d="M 88 200 Q 110 208 132 200" stroke="#d4a87a" stroke-width="1" fill="none" opacity="0.5"/>

    <!-- ear tufts -->
    <path d="M 70 56 Q 64 30 60 24 Q 78 28 82 50 Z" fill="url(#owlBody)"/>
    <path d="M 150 56 Q 156 30 160 24 Q 142 28 138 50 Z" fill="url(#owlBody)"/>

    <!-- eye rings -->
    <circle cx="80"  cy="105" r="32" fill="#fcfaf5" stroke="#1a1a1a" stroke-width="3"/>
    <circle cx="140" cy="105" r="32" fill="#fcfaf5" stroke="#1a1a1a" stroke-width="3"/>

    <!-- eye separator -->
    <path d="M 109 105 L 111 105" stroke="#1a1a1a" stroke-width="3" fill="none"/>

    <!-- eyes -->
    <ellipse cx="80"  cy="106" rx="15" ry="17" fill="#0d0a08"/>
    <circle cx="85"   cy="99"  r="4" fill="#ffffff"/>
    <circle cx="76"   cy="113" r="1.8" fill="#ffffff" opacity="0.75"/>
    <ellipse cx="140" cy="106" rx="15" ry="17" fill="#0d0a08"/>
    <circle cx="145"  cy="99"  r="4" fill="#ffffff"/>
    <circle cx="136"  cy="113" r="1.8" fill="#ffffff" opacity="0.75"/>

    <!-- beak -->
    <path d="M 110 138 L 100 152 Q 110 158 120 152 Z" fill="url(#beak)" stroke="#a4660d" stroke-width="1.5" stroke-linejoin="round"/>

    <!-- mouth -->
    <g transform="translate(110 172)">
      <path d="M -14 -2 Q 0 8 14 -2" stroke="#1a1a1a" stroke-width="2" fill="none" stroke-linecap="round"/>
      <ellipse cx="0" cy="2" rx="14" ry="3" fill="#1a1a1a"/>
    </g>
  </g>
</svg>
